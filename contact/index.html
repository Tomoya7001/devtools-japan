<html lang="ja">
<head>

    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ | DevTools Japan</title>
    <meta name="description" content="DevTools Japanへのお問い合わせ。ご意見、ご要望、不具合報告などはこちらから。">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#06060b;--bg-card:#111118;--border:#1e1e30;--text:#e4e4f0;--text2:#8888a8;--text3:#4a4a68;--accent:#6366f1;--accent-dim:rgba(99,102,241,0.08);--radius:12px}
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:2}
        .container{max-width:600px;margin:0 auto;padding:40px 20px}
        a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
        h1{font-size:1.6rem;font-weight:700;margin-bottom:24px}
        .back{display:inline-block;margin-bottom:24px;font-size:0.85rem;color:var(--text3)}
        p{margin-bottom:16px;color:var(--text2);font-size:0.9rem}
        .form-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:24px}
        .field{margin-bottom:16px}
        .field label{display:block;font-size:0.8rem;color:var(--text3);margin-bottom:6px}
        .field input,.field textarea,.field select{width:100%;padding:12px 14px;background:#0a0a14;border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.2s}
        .field input:focus,.field textarea:focus{border-color:var(--accent)}
        .field textarea{min-height:140px;resize:vertical}
        .btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:0.95rem;font-weight:500;cursor:pointer;transition:opacity 0.2s}
        .btn:hover{opacity:0.9}
        .note{background:var(--accent-dim);border:1px solid rgba(99,102,241,0.15);border-radius:8px;padding:12px 16px;font-size:0.8rem;color:var(--accent);margin-bottom:24px}
        footer{text-align:center;margin-top:60px;padding-top:20px;border-top:1px solid var(--border);color:var(--text3);font-size:0.75rem}
    </style>
</head>
<body>
<div class="container">
    <a href="/" class="back">&larr; トップページに戻る</a>
    <h1>お問い合わせ</h1>
    <p>DevTools Japanへのご意見、ご要望、不具合報告などをお寄せください。</p>

    <div class="note">※ このフォームはデモ用です。実際の運用時にはFormspree、Google Forms、またはメールアドレスに置き換えてください。</div>

    <div class="form-card">
        <div class="field"><label>お名前（任意）</label><input type="text" id="name" placeholder="山田太郎"></div>
        <div class="field"><label>メールアドレス（任意）</label><input type="email" id="email" placeholder="example@mail.com"></div>
        <div class="field"><label>カテゴリ</label>
            <select id="category">
                <option>ご意見・ご感想</option>
                <option>ツールの不具合報告</option>
                <option>新規ツールのリクエスト</option>
                <option>その他</option>
            </select>
        </div>
        <div class="field"><label>メッセージ</label><textarea id="message" placeholder="お問い合わせ内容をご記入ください..."></textarea></div>
        <button class="btn" onclick="submit()">送信する</button>
    </div>
    <div id="result" style="display:none;text-align:center;padding:20px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);color:var(--accent);font-size:0.95rem"></div>

    <footer><p>&copy; 2026 DevTools Japan</p></footer>
</div>
<script>
function submit(){
    document.getElementById('result').style.display='block';
    document.getElementById('result').textContent='お問い合わせありがとうございます。（※デモ表示：実運用時にフォーム送信先を設定してください）';
}
</script>
</body>
</html>
