<!DOCTYPE html>
<html lang="ja">
<head>

    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ | DevTools Japan</title>
    <meta name="description" content="DevTools Japanへのお問い合わせ。ご意見、ご要望、不具合報告などはこちらから。">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="canonical" href="https://www.devtools-japan.com/contact/">
    <style>
        :root{--bg:#f7f8fb;--bg-card:#ffffff;--border:#e0e2ed;--text:#1e1e35;--text2:#5a5f78;--text3:#9498b0;--accent:#10b981;--radius:12px}
        ::selection{background:rgba(99,102,241,0.15);color:#1e1e35}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:2}
        .container{max-width:600px;margin:0 auto;padding:40px 20px}
        a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
        h1{font-size:1.6rem;font-weight:700;margin-bottom:8px;color:var(--accent)}
        .sub{color:var(--text2);font-size:0.85rem;margin-bottom:24px}
        .back{display:inline-flex;align-items:center;gap:6px;margin-bottom:24px;font-size:0.8rem;color:var(--text3);text-decoration:none}
        .form-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-bottom:24px}
        .field{margin-bottom:18px}
        .field label{display:block;font-size:0.8rem;color:var(--text2);margin-bottom:6px;font-weight:500}
        .field input,.field textarea,.field select{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.2s}
        .field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent)}
        .field textarea{min-height:150px;resize:vertical}
        .btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:0.95rem;font-weight:600;cursor:pointer;transition:opacity 0.2s}
        .btn:hover{opacity:0.9}
        .btn:disabled{opacity:0.5;cursor:not-allowed}
        .note{font-size:0.75rem;color:var(--text3);margin-top:12px;line-height:1.6}
        .success{text-align:center;padding:40px 0}
        .success h2{color:var(--accent);font-size:1.2rem;margin-bottom:8px}
        .success p{color:var(--text2);font-size:0.85rem}
        footer{text-align:center;margin-top:60px;padding-top:20px;border-top:1px solid var(--border);color:var(--text3);font-size:0.75rem}
    </style>
</head>
<body>
<div class="container">
    <a href="/" class="back"><svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8h5z"/></svg> DevTools Japan トップへ</a>
    <h1>お問い合わせ</h1>
    <p class="sub">バグ報告、機能リクエスト、ご意見などお気軽にどうぞ</p>

    <div class="form-card" id="formCard">
        <form action="https://formspree.io/f/mbdpjage" method="POST" id="contactForm">
            <div class="field">
                <label for="name">お名前</label>
                <input type="text" id="name" name="name" placeholder="山田 太郎" required>
            </div>
            <div class="field">
                <label for="email">メールアドレス</label>
                <input type="email" id="email" name="email" placeholder="your@email.com" required>
            </div>
            <div class="field">
                <label for="category">お問い合わせ種別</label>
                <select id="category" name="category">
                    <option value="ご意見・ご感想">ご意見・ご感想</option>
                    <option value="バグ報告">バグ報告</option>
                    <option value="機能リクエスト">機能リクエスト</option>
                    <option value="その他">その他</option>
                </select>
            </div>
            <div class="field">
                <label for="message">メッセージ</label>
                <textarea id="message" name="message" placeholder="お問い合わせ内容をご記入ください" required></textarea>
            </div>
            <button type="submit" class="btn" id="submitBtn">送信する</button>
            <p class="note">※ 返信までに2〜3営業日いただく場合があります。</p>
        </form>
    </div>

    <div id="thankYou" style="display:none" class="form-card">
        <div class="success">
            <h2>送信完了しました</h2>
            <p>お問い合わせありがとうございます。<br>内容を確認の上、返信いたします。</p>
        </div>
    </div>

    <footer>
        <p style="margin-bottom:8px">&copy; 2026 DevTools Japan — 無料オンラインツール</p>
        <p style="font-size:0.65rem"><a href="/about/" style="color:inherit;text-decoration:none;margin:0 8px">サイトについて</a> | <a href="/privacy/" style="color:inherit;text-decoration:none;margin:0 8px">プライバシーポリシー</a> | <a href="/contact/" style="color:inherit;text-decoration:none;margin:0 8px">お問い合わせ</a></p>
    </footer>
</div>
<script>
document.getElementById('contactForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.textContent = '送信中...';
    btn.disabled = true;
    try {
        const res = await fetch(this.action, {
            method: 'POST',
            body: new FormData(this),
            headers: { 'Accept': 'application/json' }
        });
        if (res.ok) {
            document.getElementById('formCard').style.display = 'none';
            document.getElementById('thankYou').style.display = 'block';
        } else {
            alert('送信に失敗しました。時間をおいて再度お試しください。');
            btn.textContent = '送信する';
            btn.disabled = false;
        }
    } catch (err) {
        alert('送信に失敗しました。時間をおいて再度お試しください。');
        btn.textContent = '送信する';
        btn.disabled = false;
    }
});
</script>
</body>
</html>
